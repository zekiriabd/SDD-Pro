# -------------------------------------------------------------------------
# Agent: spec-compliance-reviewer (Sonnet 4.6) — depuis v6.5.2
# Phase: 6.4 (post-dev, parallèle à code-reviewer + a11y + security scan)
# Token footprint estimé: ~8-15 KB par feature (Sonnet 4.6, sélectif via plans + AC ciblage)
# Pattern: "Do not trust the report" hérité de superpowers v5.1 — re-lit le
#          code matérialisé AC-par-AC indépendamment des rapports dev-*.
# Activation: opt-in via SpecComplianceMode (défaut: manual = skip).
# -------------------------------------------------------------------------
spec-compliance-reviewer:
  reads:
    # Order: stable → semi → volatile (cache_control canonical order, cf. sdd_lib/cache_control.py)
    - workspace/input/stack/stack.md             # Project Config (SpecComplianceMode, SpecComplianceFailOn) · cache_layer: stable
    - .claude/rules/error-classification.md      # taxonomie [SPEC_*] §1.13 · cache_layer: stable
    - workspace/output/src/{BackendName}/**      # code production (fallback convention si pas de plan) · cache_layer: semi
    - workspace/output/src/{AppName}/**          # code production · cache_layer: semi
    - workspace/output/src/{LibName}/**          # lib partagée si présente · cache_layer: semi
    - workspace/input/feats/{n}-*.md             # FEAT parente (passif, contexte) · cache_layer: volatile
    - workspace/output/us/{n}-*.md               # toutes les US (source de vérité ACs) · cache_layer: volatile
    - workspace/output/plans/{n}-*.{back,front}.md  # mode preferred : sélection fichiers par AC · cache_layer: volatile
    # Anti-pattern strict : pas de Glob workspace/output/src/**/*
    # Anti-pattern par design : NE LIT PAS les rapports d'autres agents
    #   (cf. agent §STEP 0 "Périmètre strict")
  writes:
    - workspace/output/.sys/.validation/{n}-spec-compliance.md       # rapport humain
    - workspace/output/.sys/.validation/{n}-spec-compliance.json     # schéma machine validé par validate_spec_compliance.py
  forbidden_reads:
    - workspace/output/us/{other-feat}            # autres FEATs
    - workspace/input/feats/{other}.md            # autres FEATs
    - workspace/output/.sys/.validation/{n}-code-review.*   # NEVER (bias toward not-trust-report)
    - workspace/output/.sys/.validation/{n}-security-scan.* # NEVER
    - workspace/output/qa/feat-{n}/a11y-report.*  # NEVER
    - .claude/stacks/qa/                          # hors scope
    - workspace/output/.sys/.context/             # hors scope direct
  forbidden_writes:
    - workspace/output/src/                       # read-only strict (jamais de patch)
    - workspace/output/us/                        # responsabilité po
    - workspace/output/qa/                        # responsabilité qa
    - workspace/output/dashboard/                 # legacy v6 (agent dashboard retiré v7.0.0)
    - workspace/output/.sys/.context/             # responsabilité po/arch/elicitor
    - workspace/output/plans/                     # ne planifie pas
    - workspace/output/.sys/.validation/{n}-code-review.*  # responsabilité code-reviewer
    - workspace/output/.sys/.validation/{n}-readiness.md   # responsabilité /feat-validate
  config_flags:                                   # dans Project Config
    - SpecComplianceMode: "off | full | manual (défaut: manual)"
    - SpecComplianceFailOn: "critical | serious | moderate | minor (défaut: serious)"
  exit_silent_when:
    - "SpecComplianceMode: off"
    - "SpecComplianceMode: manual"                # skip auto-invoke (cf. phase_planner.py _decide_spec_compliance)
  idempotent: true                                # peut être ré-invoqué sans risque

# -------------------------------------------------------------------------
# Agent constitutioner (Sonnet 4.6) — externalisé d'arch Phase D 2026-05-13
# Rôle: ADRs (atomic timestamp) + §4/§6/§1 constitution.md + INDEX.md
#       ADRs + read-back v5.0.
# Invocation: arch STEP 12.5 (fin de Phase B).
# Token footprint estimé: ~5-10 KB (lecture stack.md + constitution.md +
#       glob ADRs existants + template ADR).
# -------------------------------------------------------------------------
constitutioner:
  reads:
    # Order: stable → semi → volatile (cache_control canonical order, cf. sdd_lib/cache_control.py)
    - workspace/input/stack/stack.md                   # cache_layer: stable
    - .claude/templates/adr.template.md                # cache_layer: stable
    - .claude/rules/ownership.md                       # Partie B §3 numérotation atomique ADR (was file-ownership.md, consolidated v7.0.0) · cache_layer: stable
    - .claude/rules/error-classification.md            # cache_layer: stable
    - workspace/output/.sys/.context/constitution.md   # cache_layer: semi
    - workspace/output/.sys/.context/adrs/ADR-*.md     # idempotence par slug · cache_layer: semi
  writes:
    - workspace/output/.sys/.context/adrs/ADR-{YYYYMMDDTHHmmss}-{slug}.md
    - workspace/output/.sys/.context/constitution.md   # Edit ligne par ligne §1/§4/§6
    - workspace/output/.sys/.context/adrs/INDEX.md     # régénéré
  forbidden_reads:
    - workspace/input/feats/                # hors scope (décisions déjà actées)
    - workspace/output/us/                  # hors scope
    - workspace/input/ui/                   # hors scope
    - workspace/output/src/                 # hors scope
  forbidden_writes:
    - workspace/output/src/                 # responsabilité dev-* / arch
    - workspace/output/us/                  # responsabilité po
    - workspace/input/                      # read-only
  idempotent: true

