# SDD_Pro — Loader Manifest
#
# ============================================================================
# Sémantique des 3 layers documentation (audit C1 closure 2026-06-08)
# ============================================================================
#
# SDD_Pro a 3 couches documentaires complémentaires (PAS 3 SSoT en conflit) :
#
#   1. `agents/{agent}.md`  — **BEHAVIOR & SUBSTANCE**
#      Comportement de l'agent : STEPs ordonnés, prompts inline, anti-derive,
#      substance des règles inlinée pour économie tokens (v5.0 hoist).
#      Le LLM lit CE fichier comme prompt système. Quand un agent dit
#      "rule X inlinée, plus lue", il signifie : "la substance est ici dans
#      mon prompt, je n'invoque pas le tool Read sur le fichier rule".
#
#   2. `loader.yml`         — **CONTEXT BUDGET & CACHE STRATEGY** (CE FICHIER)
#      Liste les paths dont le **contenu est présent dans le contexte de
#      l'agent** au moment de son exécution — que ce soit via Read tool OU
#      via inlining dans son .md. Utilisé par `context_budget.py` pour
#      estimer le coût tokens, par `cache_control.py` pour placer les
#      breakpoints Anthropic, par `audit_file_ownership.py` pour vérifier
#      qu'un agent n'écrit que dans son scope `writes:`. **Pas une
#      duplication des STEPs de l'agent — un complément budget-aware.**
#
#   3. `python/{sdd_lib,sdd_scripts,sdd_hooks,sdd_admin}/` — **ENFORCEMENT**
#      Les scripts Python qui valident, calculent, et bloquent les violations
#      au runtime. Pas du contenu LLM — du code déterministe.
#
# Conséquence : un agent peut dire "rule X inlinée" dans son .md ET loader.yml
# peut lister `rules/X.md` dans ses `reads:` — c'est COHÉRENT. Le premier
# documente le mécanisme de loading (inline), le second documente le contenu
# présent dans le contexte (budget). Pas de SSoT conflict.
#
# Toute modification d'un agent → mise à jour synchrone de cette section
# pour préserver l'audit budget cross-agent.
# ============================================================================

version: "7.0.0"
updated: "2026-06-08"

# =========================================================================
# Cache layers (v7.0.0 P2 #11 — Anthropic prompt caching strategy)
# =========================================================================
# Chaque entrée `reads:` peut être annotée `cache_layer: stable|semi|volatile`
# pour piloter le placement des markers `cache_control: ephemeral` :
#
# - stable    : invariant inter-runs (loader.yml, stacks, rules consolidées).
#               Cachable jusqu'à 5 min TTL Anthropic. Gain ~90% prompt cache hit.
# - semi      : invariant intra-FEAT (CLAUDE.md per-project, schema.json).
#               Cachable courte durée — invalidé à chaque /arch-init.
# - volatile  : variable per-US (US courante, mockup HTML, plan from-plan).
#               JAMAIS cachable.
#
# Stratégie d'application (max 4 cache breakpoints / requête Anthropic) :
#   [1] System prompt agent (.md inline)                  → cache_layer: stable
#   [2] Stacks + règles concaténés                         → cache_layer: stable
#   [3] CLAUDE.md projet + schema.json                     → cache_layer: semi
#   [4] US + HTML mockup + plan                            → cache_layer: volatile (NO CACHE)
#
# Gain mesuré baseline 2026-05-20 : 40.8% cache hit (sans markers).
# Cible post-implémentation : ≥ 60% (estimé -50% coût Opus / FEAT M).
# Détail : @.claude/docs/cache-strategy.md
#
# v7.0.0-alpha : annotations ajoutées sur les sections critiques ci-dessous.
# Implémentation effective des cache_control markers : v7.1 (refacto harness).
# =========================================================================

# =========================================================================
# Convention de langue (v5.0 — décision documentée, pas un bug)
# =========================================================================
# - Identifiants techniques (US, AC, SFD, FD, BR, ADR, classes d'erreur
#   `[STACK_LIBRARY_MISSING]`, `[QA_TEST_FAILED]`, etc.) → ANGLAIS
#   (parsing scripts + conventions agile universelles)
# - Documentation utilisateur (CLAUDE.md, docs/, rules/, agents prompts) → FRANÇAIS
#   (public cible Tech Lead francophone)
# - Code généré (Razor, services C#, etc.) → ANGLAIS (convention universelle)
# - Mockups HTML libellés métier → FRANÇAIS (métier francophone)
#
# Le mix est intentionnel et ne fait pas l'objet d'un fix unilatéral.
# =========================================================================

# =========================================================================
# Cross-agent reads (v7.0.0+)
# =========================================================================
# Règles chargées implicitement par TOUS les agents listés ci-dessous via
# référence `@.claude/rules/{nom}.md` dans leur prompt. Annotation
# `cache_layer: stable` car invariant inter-runs (cachable 5 min TTL).
#
# - .claude/rules/output-protocol.md (v7.0.0)
#     Référencée par les 12 agents (po, arch, dev-backend, dev-frontend,
#     qa, elicitor, constitutioner, code-reviewer, security-reviewer,
#     spec-compliance-reviewer, arch-reviewer, adversarial-reviewer) ET
#     les 12 commandes user-facing (sdd-bootstrap, feat-generate,
#     feat-validate, sdd-full, sdd-poc, dev-run, qa-generate,
#     sdd-review, sdd-status, sdd-discover-stack, sdd-serve,
#     sdd-kill-server). Définit le protocole de sortie chat executive
#     (1L `[AGENT] résumé (X%)`, anti-verbose, ERROR 3L disque préservé).
#     Coût ~4-6 KB par invocation (substance dans la règle, agents/
#     commandes ne portent qu'un mini bloc 20L de paramétrage).
#
#     Couches complémentaires (hors prompt agent) :
#       * Statusline `sdd_admin.statusline` (`.claude/python/sdd_admin/
#         statusline.py`) — single-line bottom-of-screen view du run
#         actif (`[AGENT] X% · FEAT N-Name · US m-Name · elapsed`).
#         Lit `workspace/output/db/console.db` (table `runs` + `events`).
#         Câblé dans `.claude/settings.json` clé `statusLine`. Désactivable
#         per-dev via `.claude/settings.local.json` (statusLine: null).
#
# =========================================================================
# Sérialisation des writes sur constitution.md (v3+)
# =========================================================================
# La matrice phase → agent → section de constitution.md est définie dans
# **@.claude/rules/ownership.md §2 (Partie B "Constitution & ADRs")**.
# Cette section est l'UNIQUE Source of Truth (SSoT) pour la sérialisation.
#
# Audit C4 closure 2026-06-08 — déduplication : avant ce commit, la matrice
# était redéclarée verbatim ici, créant une maintenance double. Le contenu
# est désormais centralisé dans `ownership.md §2` ; loader.yml pointe.
#
# Source canonique : @.claude/rules/ownership.md §2
# Détails procéduraux : agents/po.md STEP 8.5, agents/arch.md STEP 12.5-12.6
#                       (read-back validation v5.0)
# =========================================================================

# -------------------------------------------------------------------------
# Agent: po (Sonnet 4.6)
# Phase: 2 (US generation)
# Token footprint estimé: ~5-15 KB par invocation
# -------------------------------------------------------------------------
po:
  reads:
    # Order: stable → semi → volatile (cache_control canonical order, cf. sdd_lib/cache_control.py)
    - .claude/templates/us.template.md         # cache_layer: stable (template invariant)
    - workspace/output/.sys/.context/constitution.md # v3 — si présent (lecture acteurs/glossaire) · cache_layer: semi
    - workspace/input/feats/{n}-*.md           # FEAT parente (1 fichier) · cache_layer: volatile
    # v5.0 Inline Rules (dans agents/po.md, plus de Read mandatory) :
    #   - us-granularity.md §1-§4 (5 anti-patterns détaillés)
    #   - .claude/rules/ownership.md (procédure §3 inline en STEP 8.5)
    # v5.0 Économie : ~16-20k tokens/invocation
  writes:
    - workspace/output/us/{n}-{m}-*.md         # 1 à 6 fichiers par FEAT (cible 1-3)
    - workspace/output/.sys/.context/constitution.md # v3 — append-only §3 (acteurs), §2 (glossaire)
  forbidden_reads:
    - workspace/input/stack/                   # hors périmètre PO
    - workspace/input/ui/                      # hors périmètre PO (mockups HTML)
    - workspace/output/us/{m}-*.md             # autres FEATs
    - workspace/output/src/                    # responsabilité dev-*

# -------------------------------------------------------------------------
# Agent UI : SUPPRIMÉ en v4.0.0
# Les mockups HTML déposés dans workspace/input/ui/ sont lus directement par
# dev-frontend (pas d'extraction PNG → markdown intermédiaire).
# -------------------------------------------------------------------------

# -------------------------------------------------------------------------
# Agent: arch (Sonnet 4.6)
# Phase: 3 (bootstrap + DB scaffolding + digest)
# Token footprint estimé: ~10-30 KB (lecture stacks complète)
# Une seule invocation par projet (idempotent)
# -------------------------------------------------------------------------
arch:
  reads:
    # Order: stable → semi → volatile (cache_control canonical order, cf. sdd_lib/cache_control.py)
    # v7.0.x audit 2026-06-08 — stack.md unified to `stable` across all 9 agents
    # (was `volatile` here only — incoherent. Tech Lead edits stack.md rarely
    # between sessions, not per-run; the 5min TTL absorbs the rare changes.)
    - workspace/input/stack/stack.md     # cache_layer: stable (Project Config invariant intra-session)
    - .claude/stacks/{cat}/{active}.md   # tous stacks actifs (sélectif — backend, frontend, ui, auth, qa, fullstack, mobiles). · cache_layer: stable
    # NOTE MN4 (audit 2026-06-07) — Distinction stack vs combo :
    #   - Côté STACK atomique : fullstack/* et mobiles/* restent 🟡 « experimental » (jamais validés en isolation end-to-end).
    #   - Côté COMBO (assemblage de 3-6 stacks) : 5 fullstacks (angular-universal, blazor-server, kotlin-mustache, next, nuxt) et 2 mobiles (maui Windows, react-native Expo Web) sont 🟢 bench-validated runtime 2026-06-05 dans des combos précis (cf. docs/validated-combos.md §1.3).
    # Marquage runtime via `preflight_stack_combo` (combos.json) ; la doc d'un stack reste à son tier d'isolation.
    - .claude/stacks/archi/{ArchiPattern}.md  # MVC (défaut) / DDD / microservice (🟡 expérimental) — UNIQUEMENT si AppType=back-front (v6.7.6+). · cache_layer: stable
    - .claude/templates/adr.template.md  # v3 — nécessaire pour Phase D · cache_layer: stable
    - workspace/output/.sys/.context/constitution.md     # v3 — si présent · cache_layer: semi
    - workspace/output/.sys/.context/adrs/ADR-*.md       # v3 — index existants (idempotence) · cache_layer: semi
    # v5.0 Inline Rules (dans agents/arch.md, plus de Read mandatory) :
    #   - .claude/rules/ownership.md (writes par §, ADR atomique)
    #   - ownership.md §1 (matrice owner arch, was file-ownership.md)
    #   - library-and-stack.md §0 (runtime LTS / CVE / origine, ex-library-policy.md)
    # v6.1 Read mandatory ajouté (depuis 2026-05-08) :
    #   - .claude/rules/error-classification.md
    # v5.0 Économie : ~12-18k tokens/invocation
  writes:
    - workspace/output/src/{AppName}.sln
    - workspace/output/src/{AppName}/             # projet frontend vide
    - workspace/output/src/{BackendName}/         # projet backend vide
    - workspace/output/src/{LibName}/             # lib partagée si configurée
    - workspace/output/db/schema.json             # si DatabaseType ≠ none
    - workspace/output/db/schema.prev.json        # backup ancienne version
    - workspace/output/db/schema.md               # si DatabaseType ≠ none
    - workspace/output/db/schema.diff.md          # diff vs prev
    - workspace/output/src/{BackendName}/Entities/ # scaffolding Database-First
    - workspace/output/src/{BackendName}/CLAUDE.md # contexte projet backend
    - workspace/output/src/{AppName}/CLAUDE.md    # contexte projet frontend
    - workspace/output/src/{LibName}/CLAUDE.md    # contexte projet lib
    - workspace/output/.sys/.context/adrs/ADR-{YYYYMMDDTHHmmss}-*.md # timestamp atomique
    - workspace/output/.sys/.context/constitution.md    # update §4 stack + append §6 ADRs
  reads_env:                            # uniquement si DatabaseType ≠ none
    - DB_HOST
    - DB_PORT
    - DB_NAME
    - DB_USER
    - DB_PASSWORD
  forbidden_reads:
    - workspace/input/feats/
    - workspace/output/us/
    - workspace/input/ui/                         # mockups HTML hors scope arch
  forbidden_writes:
    - workspace/output/src/**/*.cs                # code applicatif (sauf Entities)
    - workspace/output/src/**/*.razor             # responsabilité dev-frontend

# -------------------------------------------------------------------------
# Agent: dev-backend (Opus 4.7 — depuis 2026-05-08, split modèles)
# Phase: 4 (génération code serveur)
# Token footprint estimé: ~3-7 KB par US (grâce à CLAUDE.md projet)
# Invocations parallèles : 1 par US backend
# -------------------------------------------------------------------------
dev-backend:
  # cache_layer annotations v7.0.0 P2 #11 — gain estimé -50% coût Opus
  # après implémentation cache_control markers (v7.1).
  # Order: stable → semi → volatile (cache_control canonical order, cf. sdd_lib/cache_control.py)
  reads:
    # --- stable (invariant inter-FEAT, cachable 5 min TTL) ---
    - { path: workspace/input/stack/stack.md, cache_layer: stable }                # Project Config
    - { path: ".claude/stacks/backend/{active}.md", cache_layer: stable }
    # fullstack/* chargeable mais 🟡 expérimental (aucun combo validé bout-en-bout) — n'utiliser que si AppType=fullstack.
    - { path: ".claude/stacks/fullstack/{active}.md", cache_layer: stable, status: experimental }
    - { path: ".claude/stacks/archi/{ArchiPattern}.md", cache_layer: stable }  # MVC | DDD | microservice (🟡 expérimental pour microservice)
    - { path: ".claude/stacks/auth/{active}.md", cache_layer: stable }
    - { path: .claude/rules/dev-shared-preflight.md, cache_layer: stable }   # v7.0.0 — STEP 0/0.5/1/1.bis hoist cross-agent
    - { path: .claude/rules/build-and-loop.md, cache_layer: stable }         # v7.0.0 — SSOT patterns dev-* (ex backend-first + dev-shared)
    - { path: .claude/rules/error-classification.md, cache_layer: stable }   # v6.1 — taxonomie classes + pilotage build_loop
    # --- semi-stable (invariant intra-FEAT, invalidé par /arch-init) ---
    - { path: "workspace/output/src/{Project}/CLAUDE.md", cache_layer: semi }        # CLAUDE.md projet
    - workspace/output/db/schema-slice-{n}-{m}.json   # per-US slice Levier 4 (audit 2026-06-08), preferred · cache_layer: semi
    - { path: workspace/output/db/schema.json, cache_layer: semi }                 # fallback if no slice present
    # --- volatile (per-US, jamais cachable) ---
    - { path: "workspace/output/us/{n}-{m}-*.md", cache_layer: volatile }            # US ciblée (1 fichier)
    - { path: "workspace/input/ui/{n}-{m}-*.html", cache_layer: volatile }           # HTML mockup passif
    - { path: "workspace/output/plans/{n}-{m}-*.back.md", cache_layer: volatile }    # plan From Plan
    # v5.0 Inline Rules (dans agents/dev-backend.md, plus de Read mandatory) :
    #   - library-and-stack.md
    #   - ownership.md§1-§2
    # v6.1 Read mandatory ajoutés :
    #   - .claude/rules/error-classification.md (depuis 2026-05-08) — taxonomie
    #     8 classes, pilotage build_loop CORRECTIBLE vs BLOCKING (listée ci-dessus)
    #   - .claude/rules/build-and-loop.md (depuis 2026-05-08) — SSOT 7 patterns
    #     partagés (context budget, path safety, mode detection, LibName lock,
    #     anti-derive, QA ownership, plan construction) (listée ci-dessus)
    # v7.0.0 Read mandatory ajouté :
    #   - .claude/rules/dev-shared-preflight.md — substance hoistée des STEP 0/0.5/1/1.bis
    #     (preflight script-driven, context budget, mode From Plan, path safety
    #     Front/Back isolation) (listée ci-dessus)
    # v5.0 Reads conditionnels (lazy) :
    #   - workspace/output/.sys/.context/constitution.md  # uniquement si terme ambigu
    #   - workspace/output/.sys/.context/adrs/INDEX.md    # uniquement au STEP 5 avant création ADR
    #   - workspace/output/.sys/.context/adrs/*.md        # fallback si INDEX.md absent
    # v5.0 Économie : ~16-20k tokens/dispatch
  writes:
    - workspace/output/src/{BackendName}/Services/
    - workspace/output/.sys/.context/adrs/ADR-{YYYYMMDDTHHmmss}-*.md # timestamp atomique
    - workspace/output/src/{BackendName}/Endpoints/
    - workspace/output/src/{BackendName}/DTOs/
    - workspace/output/src/{BackendName}/Mappers/
    - workspace/output/src/{BackendName}/Program.cs  # augment
    - workspace/output/plans/{n}-{m}-*.back.md    # mode :plan uniquement
  forbidden_reads:
    - workspace/output/us/{other}                 # autres US
    - workspace/input/feats/
    - workspace/input/ui/{other}.html             # mockups HTML d'autres US
    - .claude/stacks/frontend/
    - .claude/stacks/ui/
  modes:
    - normal: "{n}-{m}"                 # plan inline + code + build
    - plan_only: "{n}-{m}:plan"         # produit plan, STOP avant code
    - from_plan: "{n}-{m} + plan exists" # consomme plan, code + build
  exit_silent_when:
    - "frontend-only US"                # skipped sans erreur

# -------------------------------------------------------------------------
# Agent: dev-frontend (Opus 4.7 — depuis 2026-05-08, split modèles)
# Phase: 4 (génération code client)
# Token footprint estimé: ~5-10 KB par US (HTML + CLAUDE.md + stacks)
# Invocations parallèles : 1 par US frontend
# v4.0.0 : plus de PNG vision, plus de UI markdown intermédiaire.
# Lecture directe du mockup HTML statique (texte).
# -------------------------------------------------------------------------
dev-frontend:
  # cache_layer annotations v7.0.0 P2 #11 — symétrie avec dev-backend
  # Order: stable → semi → volatile (cache_control canonical order, cf. sdd_lib/cache_control.py)
  reads:
    # --- stable (invariant inter-FEAT, cachable 5 min TTL) ---
    - workspace/input/stack/stack.md              # lu UNE FOIS en STEP 0 Phase B (v5.0) · cache_layer: stable
    - .claude/stacks/frontend/{active}.md  # fallback si CLAUDE.md insuffisant · cache_layer: stable
    - .claude/stacks/ui/{active}.md        # mapping composants DS (§2 + §7) · cache_layer: stable
    - .claude/stacks/auth/{active}.md      # patterns d'injection auth client · cache_layer: stable
    - .claude/rules/dev-shared-preflight.md   # v7.0.0 — STEP 0/0.5/1/1.bis hoist cross-agent · cache_layer: stable
    - .claude/rules/build-and-loop.md         # v7.0.0 — SSOT patterns dev-* (ex backend-first + dev-shared) · cache_layer: stable
    - .claude/rules/error-classification.md   # v6.1 — taxonomie classes + pilotage build_loop · cache_layer: stable
    # --- semi-stable (invariant intra-FEAT) ---
    - workspace/output/src/{Project}/CLAUDE.md    # CLAUDE.md par projet · cache_layer: semi
    # --- volatile (per-US, jamais cachable) ---
    - workspace/output/us/{n}-{m}-*.md            # US ciblée (1 fichier) · cache_layer: volatile
    - workspace/input/ui/{n}-{m}-*.html           # mockup HTML statique = source · cache_layer: volatile
                                        # de vérité visuelle (libellés,
                                        # structure, classes, couleurs
                                        # inline). Lecture texte directe.
    - workspace/output/plans/{n}-{m}-*.front.md   # plan existant si /dev-plan · cache_layer: volatile
                                        # a tourné — mode From Plan
    # v5.0 Inline Rules (dans agents/dev-frontend.md, plus de Read mandatory) :
    #   - library-and-stack.md
    #   - ownership.md§1-§2
    # v6.1 Read mandatory ajoutés (listés ci-dessus avec path complet) :
    #   - .claude/rules/error-classification.md (depuis 2026-05-08)
    #   - .claude/rules/build-and-loop.md (depuis 2026-05-08) — SSOT 7 patterns
    #     partagés avec dev-backend (cf. §note dev-backend ci-dessus)
    # v7.0.0 Read mandatory ajouté :
    #   - .claude/rules/dev-shared-preflight.md — substance hoistée des STEP 0/0.5/1/1.bis
    # v5.0 Reads conditionnels (lazy) :
    #   - workspace/output/.sys/.context/constitution.md  # uniquement si terme ambigu
    #   - workspace/output/.sys/.context/adrs/INDEX.md    # uniquement au STEP 6 avant création ADR
    #   - workspace/output/.sys/.context/adrs/*.md        # fallback si INDEX.md absent
    # v5.0 Économie : ~16-20k tokens/dispatch
  writes:
    - workspace/output/src/{AppName}/Pages/
    - workspace/output/.sys/.context/adrs/ADR-{YYYYMMDDTHHmmss}-*.md # timestamp atomique
    - workspace/output/src/{AppName}/Components/
    - workspace/output/src/{AppName}/Layouts/
    - workspace/output/src/{AppName}/wwwroot/css/theme.css  # augment
    - "**/*.razor.css"                  # CSS isolé adjacent
    - workspace/output/src/{AppName}/Program.cs   # augment éventuel
    - workspace/output/plans/{n}-{m}-*.front.md   # mode :plan uniquement
  forbidden_reads:
    - workspace/output/us/{other}                 # autres US
    - workspace/input/feats/
    - workspace/input/ui/{other}.html             # mockups HTML des autres US
    - .claude/stacks/backend/           # hors auth
  exit_silent_when:
    - "backend-only US"                 # skipped sans erreur
  modes:
    - normal: "{n}-{m}"                 # plan inline + code + build + fidelity check
    - plan_only: "{n}-{m}:plan"         # produit plan, STOP avant code
    - from_plan: "{n}-{m} + plan exists" # consomme plan, code + build + fidelity check
  fidelity_check:                       # v4 — STEP 11 dev-frontend (text-based)
    - extraire libellés, classes-clés, structure du HTML source
    - grep le markup généré pour vérifier présence des libellés
    - vérifier que les composants HTML mappés vers le DS ont leur
      pendant dans le markup (RadzenButton, RadzenDataGrid, etc.)
    - STOP + ERROR sur libellé/structure absent

# (Stubs dev-backend-strict / dev-frontend-strict / validator déplacés
#  en fin de fichier — cf. section "## Removed agents (backward-compat)".)

# -------------------------------------------------------------------------
# Agent: elicitor (Sonnet 4.6) — v3, P3
# Phase: 1.5 (élicitation structurée, optionnelle)
# Token footprint estimé:
#   - interactif: ~10-15 KB (5×1-2 questions + synthèse)
#   - --quick: ~5-8 KB (génération directe)
# -------------------------------------------------------------------------
elicitor:
  reads:
    # Order: stable → semi → volatile (cache_control canonical order, cf. sdd_lib/cache_control.py)
    - .claude/templates/risks-assumptions.template.md  # cache_layer: stable
    - workspace/output/.sys/.context/constitution.md   # si présent (acteurs cumulés) · cache_layer: semi
    - workspace/input/feats/{n}-*.md             # FEAT ciblée · cache_layer: volatile
    # v5.0 Inline Rules : substance inlinée dans agents/elicitor.md, plus de Read mandatory
    # v5.0 Économie : ~6-8k tokens/invocation
  writes:
    - workspace/input/feats/{n}-*.md             # APPEND-ONLY 5 sections enrichies
    - workspace/output/.sys/.context/constitution.md   # APPEND-ONLY §7 (risques + hypothèses)
  forbidden_reads:
    - workspace/input/stack/                     # hors scope élicitation
    - workspace/input/ui/                        # hors scope élicitation
    - workspace/output/us/                       # antérieur dans le pipeline
    - workspace/output/src/                      # post-implementation
  techniques:                          # 5 techniques d'élicitation
    - 1_pre_mortem: "risques projet (3-5 risques classifiés)"
    - 2_first_principles: "hypothèses implicites (max 7)"
    - 3_red_team: "edge cases (max 8)"
    - 4_stakeholder_mapping: "RACI (max 6)"
    - 5_inversion: "failure modes (max 4)"
  modes:
    - interactive: "5×1-2 questions, default"
    - quick: "--quick flag, génération directe sans question"

# -------------------------------------------------------------------------
# Agent: qa (Sonnet 4.6) — v3.1.0
# Phase: 5 (tests unitaires + coverage + quality scan)
# Token footprint estimé:
#   - quality-only: ~3 KB (rapport seulement, scan déterministe)
#   - tests-only: ~17-27 KB (génération tests Sonnet)
#   - tests+coverage: ~17-27 KB (coverage parsing gratuit en tokens)
#   - full: ~20-30 KB (recommandé)
# -------------------------------------------------------------------------
qa:
  reads:
    # Order: stable → semi → volatile (cache_control canonical order, cf. sdd_lib/cache_control.py)
    - .claude/stacks/qa/{active}.md    # tous QA stacks actifs (sélectif) · cache_layer: stable
    - workspace/output/src/{BackendName}/CLAUDE.md  # architecture backend (passif) · cache_layer: semi
    - workspace/output/src/{AppName}/CLAUDE.md      # architecture frontend (passif) · cache_layer: semi
    - workspace/output/db/schema-slice-{n}-*.json # per-US slices Levier 4 (preferred for fixtures) · cache_layer: semi
    - workspace/output/db/schema.json            # fallback (full schema) si slices absents · cache_layer: semi
    - workspace/output/src/{BackendName}/**/*    # code production (read-only sélectif) · cache_layer: semi
    - workspace/output/src/{AppName}/**/*        # code production (read-only sélectif) · cache_layer: semi
    - workspace/output/src/{LibName}/**/*        # contrats partagés · cache_layer: semi
    - workspace/input/feats/{n}-*.md             # FEAT parente (passif, ACs) · cache_layer: volatile
    - workspace/output/us/{n}-*.md               # US ciblées · cache_layer: volatile
    - workspace/input/ui/{n}-*.html              # HTML mockups (passif, comportements UI) · cache_layer: volatile
    # v5.0 Inline Rules (dans agents/qa.md, plus de Read mandatory) :
    #   - quality.md§2-§3
    #   - library-and-stack.md (scope étendu : tous stacks actifs §2.4)
    #   - ownership QA (substance inlinée §Ownership)
    # v6.1 Read mandatory ajouté (depuis 2026-05-08) :
    #   - .claude/rules/error-classification.md (taxonomie QA §1.7)
    # v5.0 Reads conditionnels (lazy) :
    #   - workspace/output/.sys/.context/constitution.md  # uniquement si terme ambigu
    # v5.0 Économie : ~25-35k tokens/invocation
  writes:
    - workspace/output/src/{BackendName}.Tests/**     # tests backend (xUnit/JUnit/pytest)
    - workspace/output/src/{AppName}.Tests/**         # tests Blazor (bUnit) si applicable
    - "workspace/output/src/**/__tests__/**"          # tests Node/React/Vue
    - "workspace/output/src/**/*.FEAT.ts"             # tests Angular Jasmine
    - "workspace/output/src/**/*.test.ts"             # tests Vitest adjacents
    - "workspace/output/src/**/test_*.py"             # tests Python
    - "workspace/output/src/**/*Test.kt"              # tests Kotlin JUnit
    - workspace/output/qa/feat-{n}/report.md          # rapport consolidé
    - workspace/output/qa/feat-{n}/coverage.json      # schéma normalisé (via parse_coverage.py)
    - workspace/output/qa/feat-{n}/quality.json       # sonar-like (via quality_scan.py)
  forbidden_reads:
    - workspace/input/stack/                     # hors scope QA (lecture indirecte via QA stacks)
  forbidden_writes:
    - workspace/output/src/{BackendName}/Services/  # code production (read-only strict)
    - workspace/output/src/{AppName}/Pages/         # code production (read-only strict)
    - workspace/output/src/{LibName}/Models/        # code production (read-only strict)
    - workspace/output/.sys/.context/constitution.md      # constitution read-only
    - workspace/output/.sys/.context/adrs/                # ADRs read-only
  modes:                               # selon QAMode dans Project Config
    - off: "agent jamais invoqué"
    - quality-only: "skip génération tests + coverage, ne fait que quality scan + linter"
    - tests-only: "skip quality scan + coverage, ne fait que génération + run tests"
    - tests+coverage: "skip quality scan, fait tests + run + coverage parsing"
    - full: "tous les STEP (recommandé)"
    - manual: "skip auto-invoke par /sdd-full ; user lance /qa-generate manuellement"

