# -------------------------------------------------------------------------
# Agent: code-reviewer (Sonnet 4.6) — depuis v6.3.1
# Phase: 6.4 (post-dev backend + API Gate + frontend, avant /qa-generate)
# Token footprint estimé: ~8-15 KB par feature de 3-5 US
# Invocation: manuelle en v6.3.1.0 ("review le code de la FEAT N")
#             auto-invoke depuis /dev-run STEP 6.4 en v6.3.1.1 (à venir)
# Skip silencieux si CodeReviewMode: off
# -------------------------------------------------------------------------
code-reviewer:
  reads:
    # Order: stable → semi → volatile (cache_control canonical order, cf. sdd_lib/cache_control.py)
    - workspace/input/stack/stack.md             # Project Config (CodeReviewMode, CodeReviewFailOn) · cache_layer: stable
    - .claude/rules/error-classification.md      # taxonomie [REVIEW_*] §1.10 + classes réutilisées §1.3/§1.6 · cache_layer: stable
    - .claude/rules/build-and-loop.md            # Partie B : anti-derive bullets, plan structure, QA ownership (was dev-shared.md, consolidated v7.0.0) · cache_layer: stable
    - .claude/stacks/backend/{active}.md   # §1.3 layer mapping + §3 conventions + §2.4 libs · cache_layer: stable
    - .claude/stacks/frontend/{active}.md  # §1.3 + §3 (frontend uniquement) · cache_layer: stable
    - workspace/output/src/{BackendName}/CLAUDE.md  # architecture backend · cache_layer: semi
    - workspace/output/src/{AppName}/CLAUDE.md      # architecture frontend · cache_layer: semi
    - workspace/output/src/{BackendName}/**       # code production (fallback convention si pas de plan) · cache_layer: semi
    - workspace/output/src/{AppName}/**           # code production · cache_layer: semi
    - workspace/output/src/{LibName}/**           # lib partagée si présente · cache_layer: semi
    - workspace/input/feats/{n}-*.md             # FEAT parente (passif, intent métier) · cache_layer: volatile
    - workspace/output/us/{n}-*.md               # toutes les US ciblées (passif) · cache_layer: volatile
    - workspace/output/plans/{n}-*.{back,front}.md  # mode preferred : lecture sélective via plan · cache_layer: volatile
    # Budget cible : ≤ 15 KB par invocation (Sonnet 4.6)
    # Anti-pattern strict : ne JAMAIS Glob workspace/output/src/**/* (lecture sélective via plans ou convention)
  writes:
    - workspace/output/.sys/.validation/{n}-code-review.md     # rapport humain
    - workspace/output/.sys/.validation/{n}-code-review.json   # schéma machine
  forbidden_reads:
    - workspace/output/us/{other-feat}            # autres FEATs
    - workspace/input/feats/{other}.md            # autres FEATs
    - .claude/stacks/qa/                          # hors scope review (responsabilité qa)
    - .claude/stacks/auth/                        # hors scope (review focus code applicatif)
    - .claude/stacks/ui/                          # hors scope (a11y-auditor s'en charge si actif)
    - workspace/output/.sys/.context/             # constitution/ADRs hors scope
    - workspace/output/db/                        # schema DB hors scope
    - workspace/output/qa/feat-{n}/coverage.json  # responsabilité qa
    - workspace/output/qa/feat-{n}/quality.json   # responsabilité qa
  forbidden_writes:
    - workspace/output/src/                       # read-only strict (rapport seul, jamais patch)
    - workspace/output/us/                        # responsabilité po
    - workspace/output/qa/                        # responsabilité qa
    # NOTE M14 (audit 2026-06-07) — la ligne `workspace/output/dashboard/`
    # ci-dessous est un GUARD-RAIL HISTORIQUE défensif (3 occurrences cumulées
    # pour les 3 reviewers : code-reviewer + security-reviewer +
    # spec-compliance-reviewer). L'agent `dashboard` a été retiré v7.0.0
    # mais l'entrée est conservée à dessein : empêche qu'une future ré-introduction
    # accidentelle d'un agent dashboard ne fasse Write dans ce chemin par
    # un auditor. Ne PAS retirer sans ADR `governance-cleanup-forbidden-dashboard`.
    - workspace/output/dashboard/                 # legacy v6 guard-rail (agent dashboard retiré v7.0.0, cf. note M14 ci-dessus)
    - workspace/output/.sys/.context/             # responsabilité po/arch/elicitor
    - workspace/output/plans/                     # le reviewer ne planifie pas
  modes:                                          # selon CodeReviewMode dans Project Config
    - off: "agent jamais invoqué (exit immédiat 'disabled')"
    - full: "review complet, verdict 🟢/🟡/🔴 selon CodeReviewFailOn"
    - manual: "skip auto-invoke ; Tech Lead lance via demande directe (défaut v6.3.1.0)"
  fail_on:
    - critical: "🔴 RED dès 1 issue critical (défaut)"
    - serious: "🔴 RED dès 1 issue serious ou critical"
    - moderate: "🔴 RED dès 1 issue moderate ou pire"
    - minor: "🔴 RED dès 1 issue (strict)"
  hard_blocking_classes:                          # override CodeReviewFailOn → toujours 🔴 RED
    # NOTE v7.0.0-alpha (audit P2 2026-06-06) — [REVIEW_SECRETS_HARDCODED] retiré :
    # ownership exclusif délégué à security-reviewer ([SEC_SECRET_HARDCODED], CWE-798)
    # cf. error-classification.md §1.10. code-reviewer peut encore émettre la classe
    # en `issues.minor` à titre informationnel (pointeur vers security-reviewer),
    # mais elle n'est plus hard-blocking ici pour éviter le double-rapport sur les
    # mêmes file:line. La dé-dup cross-source (REVIEW_SECRETS_HARDCODED ↔
    # SEC_SECRET_HARDCODED) reste assurée par sdd_review.deduplicate_findings()
    # via CANONICAL_CLASS (cf. _review_fetch.py §6.10).
    - "[FRONTEND_BACKEND_CONTRACT_GAP]"           # feature ne marchera pas en prod
  exit_silent_when:
    - "CodeReviewMode: off"
  idempotent: true                                # peut être ré-invoqué sans risque

# -------------------------------------------------------------------------
# Agent: arch-reviewer (Sonnet 4.6) — depuis v6.11.0
# Phase: 4.8 (post-QA, post-dashboard, dans /sdd-review via /sdd-full STEP 4.8)
# Token footprint estimé: ~6-12 KB par feature de 3-5 US
# Invocation: spawn par /sdd-review STEP 3.0 si ArchReviewMode=full
# Skip silencieux si ArchReviewMode in (manual, off) — défaut "manual"
# -------------------------------------------------------------------------
arch-reviewer:
  reads:
    # Order: stable → semi → volatile (cache_control canonical order, cf. sdd_lib/cache_control.py)
    - workspace/input/stack/stack.md                # Project Config + Active Architecture Pattern + Active Tech Specs · cache_layer: stable
    - .claude/rules/error-classification.md         # taxonomie [ARCH_*] §1.18 · cache_layer: stable
    - .claude/stacks/archi/{mvc|ddd|microservice}.md  # §2 couches + §3 principes + §4 naming canonique (microservice 🟡 expérimental) · cache_layer: stable
    - .claude/stacks/backend/{active}.md            # §1.3 layer mapping backend · cache_layer: stable
    - .claude/stacks/frontend/{active}.md           # §1.3 layer mapping frontend · cache_layer: stable
    - workspace/output/.sys/.context/constitution.md  # §2 glossaire + §6 ADRs index · cache_layer: semi
    - workspace/output/.sys/.context/adrs/ADR-*.md  # ADRs (## Decision pour drift check ; pattern whitelisté is_unbounded_glob) · cache_layer: semi
    - workspace/output/src/{BackendName}/**         # code production (Glob via plan) · cache_layer: semi
    - workspace/output/src/{AppName}/**             # code production · cache_layer: semi
    - workspace/output/src/{LibName}/**             # lib partagée si présente · cache_layer: semi
    - workspace/output/plans/{n}-*.{back,front}.md  # lecture sélective des fichiers à reviewer · cache_layer: volatile
    # Budget cible : ≤ 12 KB par invocation (Sonnet 4.6)
  writes:
    - workspace/output/.sys/.validation/{n}-arch-review.md     # rapport humain
    - workspace/output/.sys/.validation/{n}-arch-review.json   # transport vers DB
  forbidden_reads:
    - workspace/output/us/{other-feat}              # autres FEATs
    - workspace/input/feats/{other}.md              # autres FEATs
    - .claude/stacks/qa/                            # hors scope arch (responsabilité qa)
    - workspace/output/qa/                          # rapports auditeurs hors scope (lecture via DB)
  forbidden_writes:
    - workspace/output/src/                         # read-only strict (rapport seul)
    - workspace/output/us/                          # responsabilité po
    - workspace/output/qa/                          # responsabilité qa
    - workspace/output/.sys/.context/               # ADRs + constitution = responsabilité po/arch/elicitor
    - workspace/output/plans/                       # ne planifie pas
    - workspace/input/stack/                        # immutable côté agent
  modes:                                            # selon ArchReviewMode dans Project Config
    - off: "agent jamais invoqué (exit immédiat 'disabled')"
    - manual: "skip auto-invoke ; lance via /sdd-review manuel ou demande directe (défaut)"
    - full: "review complet, verdict 🟢/🟡/🔴 selon ArchReviewFailOn"
  fail_on:
    - critical: "🔴 RED dès 1 issue critical (très permissif)"
    - serious: "🔴 RED dès 1 issue serious ou critical (défaut)"
    - moderate: "🔴 RED dès 1 issue moderate ou pire"
    - minor: "🔴 RED dès 1 issue (strict)"
  hard_blocking_classes: []                         # aucune classe hard-blocking par défaut
  exit_silent_when:
    - "ArchReviewMode: off"
    - "ArchReviewMode: manual (sauf demande explicite)"
  db_target:                                        # réutilise table existante (pas de schema change)
    - "qa_code_review (issue_class LIKE 'ARCH_%')"  # via ingest_agent_report --type arch-review
  idempotent: true

# -------------------------------------------------------------------------
# Agent: complexity-router (DEPRECATED v7.0.0+ — audit P1 M2 2026-06-08)
# Status: .md conservé UNIQUEMENT comme documentation du rubric de scoring.
#         L'agent LLM n'est PLUS spawné par aucun pipeline ; l'invocation
#         opérationnelle passe par le script Python déterministe
#         `sdd_scripts/complexity_router.py` (0 token, < 50 ms).
# Pour invoquer : `python -m sdd_scripts.complexity_router --feat-number {n}`
#                 (ou auto via ComplexityRouterMode=auto + hook PreToolUse à câbler).
# Entrée loader conservée car le .md existe sur disque ET pour traçabilité
# du test contract (cf. tests/test_loader_contract.py ALIVE_AGENTS_V7).
# -------------------------------------------------------------------------
complexity-router:
  reads:
    # Order: stable → semi → volatile (cache_control canonical order, cf. sdd_lib/cache_control.py)
    - workspace/input/stack/stack.md                              # Project Config (ComplexityRouterMode, Capabilities) · cache_layer: stable
    - workspace/input/feats/{n}-*.md                              # FEAT seule (SFD/BR/AC/NFR/Compliance/Volume/SLA) · cache_layer: volatile
  writes:
    - workspace/output/.sys/.routing/{n}-complexity.json          # décision machine (consommée par /sdd-full STEP 0)
    - workspace/output/.sys/.routing/{n}-complexity.md            # rapport humain 1 page
  forbidden_reads:
    - workspace/output/us/                                        # opt-in pré-pipeline, US pas encore générées
    - workspace/output/src/                                       # hors scope, le code n'existe pas encore
    - workspace/output/.sys/.context/                             # hors scope
    - .claude/stacks/                                             # hors scope (déterministe)
  forbidden_writes:
    - workspace/input/                                            # read-only
    - workspace/output/src/                                       # read-only
    - workspace/output/us/                                        # responsabilité po
    - workspace/output/plans/                                     # ne planifie pas
    - workspace/output/.sys/.validation/                          # responsabilité auditors
    - workspace/output/.sys/.context/                             # responsabilité po/arch/elicitor/constitutioner
    - workspace/output/qa/                                        # responsabilité qa + reviewers
  config_flags:                                                   # dans Project Config
    - ComplexityRouterMode: "off | auto | manual (défaut: manual)"
  modes:
    - off: "skip total (recommandation = /sdd-full par défaut)"
    - manual: "spawn explicite via Agent (défaut)"
    - auto: "auto-spawn par /sdd-full STEP 0 avant cadrage"
  fail_on: []                                                     # verdict = routing recommendation, jamais bloquant
  hard_blocking_classes: []                                       # aucune classe hard-blocking par design
  exit_silent_when:
    - "ComplexityRouterMode: off"
  db_target:
    - "(none — fichiers disque uniquement sous workspace/output/.sys/.routing/)"
  idempotent: true

# -------------------------------------------------------------------------
# Agent: adversarial-reviewer (Sonnet 4.6) — depuis v7.2.0 (R1 BMAD)
# Phase: 99% (post-agrégation `/sdd-review`, opt-in `--adversarial`)
# Token footprint estimé: ~8-15 KB par FEAT
# Invocation: spawn par /sdd-review --adversarial (manuel) OU auto si
#             AdversarialReviewMode=full dans Project Config
# Rôle: avocat du diable — 5-10 attaques que les autres reviewers
#       n'auraient pas vues. Verdict informational (jamais bloquant).
# -------------------------------------------------------------------------
adversarial-reviewer:
  reads:
    # Order: stable → semi → volatile (cache_control canonical order, cf. sdd_lib/cache_control.py)
    - workspace/input/stack/stack.md                              # Project Config (AdversarialReviewMode, Min/Max) · cache_layer: stable
    - .claude/rules/error-classification.md                       # taxonomie [ADV_*] §1.16 · cache_layer: stable
    - workspace/output/src/{BackendName}/**                       # ≤ 3 fichiers ciblés via §2.3, jamais Glob récursif · cache_layer: semi
    - workspace/output/src/{AppName}/**                           # idem · cache_layer: semi
    - workspace/output/src/{LibName}/**                           # idem si présent · cache_layer: semi
    - workspace/input/feats/{n}-*.md                              # FEAT (Functional Needs, Business Rules, ACs, §7 Risks) · cache_layer: volatile
    - workspace/output/us/{n}-*.md                                # US (ACs) · cache_layer: volatile
    - workspace/output/plans/{n}-*.{back,front}.md                # cartographie fichiers — sélection ≤ 5 chemins critiques · cache_layer: volatile
    - workspace/output/qa/feat-{n}/review.md                      # verdict consolidé (précondition stricte) · cache_layer: volatile
    - workspace/output/.sys/.validation/{n}-code-review.md        # résumé findings (header uniquement, anti-dup §2.5) · cache_layer: volatile
    - workspace/output/.sys/.validation/{n}-security-scan.md      # idem · cache_layer: volatile
    - workspace/output/.sys/.validation/{n}-spec-compliance.md    # idem · cache_layer: volatile
    - workspace/output/.sys/.validation/{n}-arch-review.md        # idem (si ArchReviewMode=full) · cache_layer: volatile
    # Anti-pattern strict : pas de Glob récursif workspace/output/src/** — lecture sélective via plan
  writes:
    - workspace/output/qa/feat-{n}/adversarial.md                 # rapport humain (canal séparé Tech Lead)
    - workspace/output/qa/feat-{n}/adversarial.json               # schéma machine (consommé par ingest_agent_report)
  forbidden_reads:
    - workspace/output/us/{other-feat}                            # autres FEATs
    - workspace/input/feats/{other}.md                            # autres FEATs
    - workspace/output/.sys/.context/                             # hors scope direct
    - .claude/stacks/qa/                                          # hors scope
  forbidden_writes:
    - workspace/output/src/                                       # read-only strict
    - workspace/output/us/                                        # responsabilité po
    - workspace/output/.sys/.context/                             # responsabilité po/arch/elicitor/constitutioner
    - workspace/output/plans/                                     # ne planifie pas
    - workspace/input/                                            # read-only
    - workspace/output/.sys/.validation/                          # responsabilité auditors classiques
  config_flags:                                                   # dans Project Config
    - AdversarialReviewMode: "off | full | manual (défaut: manual)"
    - AdversarialMinAttacks: "entier ≥ 1 (défaut: 5)"
    - AdversarialMaxAttacks: "entier ≥ AdversarialMinAttacks (défaut: 10)"
  modes:
    - off: "skip total (exit silencieux)"
    - manual: "invocation explicite uniquement via /sdd-review --adversarial (défaut)"
    - full: "auto-invoke par /sdd-review post-agrégation (sans nécessiter --adversarial)"
  fail_on: []                                                     # verdict TOUJOURS informational — jamais de bascule 🟢/🟡/🔴
  hard_blocking_classes: []                                       # aucune classe hard-blocking par design
  exit_silent_when:
    - "AdversarialReviewMode: off"
    - "AdversarialReviewMode: manual ET /sdd-review invoqué sans --adversarial"
  db_target:
    - "validation_reports (report_type='adversarial', verdict='informational', payload_json={attacks:[...]})"
  idempotent: true

# -------------------------------------------------------------------------
# Agent: security-reviewer (Sonnet 4.6)
# Phase: 6.4 (mode scan uniquement, post-dev — dev-run STEP 6.4 batch auditors)
# Token footprint estimé: ~10-20 KB par feature
#
# v7.0.0 — Mode `threat-model` RETIRÉ (governance-major-auditors-trim).
# Remplacement : template humain `.claude/templates/threat-model.template.md`
# (STRIDE light, ~15-30 min, ADR). Le pipeline n'invoque plus l'agent en
# mode threat-model — seul le mode scan reste actif.
# -------------------------------------------------------------------------
security-reviewer:
  reads:
    # Order: stable → semi → volatile (cache_control canonical order, cf. sdd_lib/cache_control.py)
    - workspace/input/stack/stack.md                # Project Config (SecurityMode, SecurityFailOn, *Enabled) · cache_layer: stable
    - .claude/rules/error-classification.md         # taxonomie [SEC_*] §1.11 · cache_layer: stable
    - .claude/stacks/backend/{active}.md §1.3+§3+§2.4   # cache_layer: stable
    - .claude/stacks/frontend/{active}.md §1.3+§3       # cache_layer: stable
    - .claude/stacks/auth/{active}.md §2-§3         # patterns d'auth (lecture passive) · cache_layer: stable
    - workspace/output/src/{BackendName}/CLAUDE.md  # architecture backend · cache_layer: semi
    - workspace/output/src/{AppName}/CLAUDE.md      # architecture frontend · cache_layer: semi
    - workspace/output/src/{BackendName}/**         # code production (fallback convention) · cache_layer: semi
    - workspace/output/src/{AppName}/**             # code production · cache_layer: semi
    - workspace/output/src/{LibName}/**             # lib partagée si présente · cache_layer: semi
    - workspace/input/feats/{n}-*.md                # FEAT parente · cache_layer: volatile
    - workspace/output/us/{n}-*.md                  # US ciblées (passif) · cache_layer: volatile
    - workspace/output/plans/{n}-*.{back,front}.md  # mode preferred : lecture sélective via plan · cache_layer: volatile
    - workspace/output/.sys/.validation/{n}-code-review.json  # dé-dup secrets avec code-reviewer (§6) · cache_layer: volatile
    # Anti-pattern strict : ne JAMAIS Glob workspace/output/src/**/* (lecture sélective)
  writes:
    - workspace/output/.sys/.validation/{n}-security-scan.md
    - workspace/output/.sys/.validation/{n}-security-scan.json
  forbidden_reads:
    - workspace/output/us/{other-feat}            # autres FEATs
    - workspace/input/feats/{other}.md            # autres FEATs
    - .claude/stacks/qa/                          # hors scope (responsabilité qa)
    - .claude/stacks/ui/                          # hors scope (responsabilité a11y/dev-frontend)
    - workspace/output/db/                        # schema DB hors scope direct (mentionné via constitution §4)
    - workspace/output/qa/feat-{n}/coverage.json  # responsabilité qa
    - workspace/output/qa/feat-{n}/quality.json   # responsabilité qa
    # a11y-report.json retiré v7.0.0 (agent accessibility-auditor supprimé,
    # remplacé par axe-core CI). Entrée préservée pour cohérence path-prefix
    # forbidden_reads — l'agent ne lit toujours pas le dossier /qa/ qui peut
    # contenir des fichiers axe-core JSON si un éventuel pont d'ingest CI
    # est câblé par le projet consommateur (out-of-scope SDD_Pro v7.0.0).
    - workspace/output/qa/feat-{n}/a11y-report.json  # (legacy v6, agent retiré v7.0.0)
  forbidden_writes:
    - workspace/output/src/                       # read-only strict (jamais de patch)
    - workspace/output/us/                        # responsabilité po
    - workspace/output/qa/                        # responsabilité qa
    # dashboard/ retiré v7.0.0 (agent dashboard supprimé, INDEX ADRs via
    # sdd_scripts/index_adrs.py). Entrée préservée comme garde-fou.
    - workspace/output/dashboard/                 # (legacy v6, agent retiré v7.0.0)
    - workspace/output/.sys/.context/             # responsabilité po/arch/elicitor
    - workspace/output/plans/                     # ne planifie pas
    - workspace/output/.sys/.validation/{n}-code-review.*  # responsabilité code-reviewer
    - workspace/output/.sys/.validation/{n}-readiness.md   # responsabilité /feat-validate
  modes:                                          # mode `scan` uniquement depuis v7.0.0
    - scan: "post-dev — OWASP Top 10 2021 (A01,A02,A03,A05,A07,A08,A09,A10) + verdict 🟢/🟡/🔴"
  config_flags:                                   # dans Project Config
    - SecurityMode: "off | full | manual (défaut: full)"
    - SecurityScanEnabled: "true | false (défaut: true)"
    - SecurityFailOn: "critical | serious | moderate | minor (défaut: critical)"
  hard_blocking_classes:                          # override SecurityFailOn → toujours 🔴 RED en mode scan
    - "[SEC_SECRET_HARDCODED]"
    - "[SEC_SQL_INJECTION]"
    - "[SEC_COMMAND_INJECTION]"
    - "[SEC_BROKEN_AUTHZ]"
    - "[SEC_BROKEN_AUTHN]"
    - "[SEC_DESERIALIZATION_UNSAFE]"
    - "[SEC_JWT_MISCONFIG]"
    - "[SEC_SSRF_RISK]"
  coordination:
    - "Mode scan dé-duplique [SEC_SECRET_HARDCODED] vs [REVIEW_SECRETS_HARDCODED] de code-reviewer (cf. agent §6)"
  exit_silent_when:
    - "SecurityMode: off"
    - "SecurityScanEnabled: false"
  idempotent: true                                # peut être ré-invoqué sans risque

